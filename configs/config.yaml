# Main configuration file
# Potato-ACHIS: Domain Adaptation for Andean Potato Disease Classification

defaults:
  - model: baseline
  - data: plantvillage
  - _self_

# Experiment settings
experiment:
  name: "plantvillage_disease_classification"
  seed: 42

# Paths
paths:
  data_dir: "./data"
  output_dir: "./outputs/plantvillage"
  log_dir: "./logs"

# Training
training:
  max_epochs: 50
  batch_size: 32
  num_workers: 4
  learning_rate: 0.001
  weight_decay: 0.0001

# Device
device: "cuda" # or "cpu"
